# https://www.playframework.com/documentation/latest/Configuration

# Slick Configuration
slick.dbs.default.profile = "slick.jdbc.H2Profile$"
slick.dbs.default.db.driver = "org.h2.Driver"
slick.dbs.default.db.url = "jdbc:h2:mem:play;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE"
slick.dbs.default.db.user = "sa"
slick.dbs.default.db.password = ""

# Optional: Enable Evolutions (Automated Table Creation)
play.evolutions.enabled = true
play.evolutions.autoApply = true

# play.modules.enabled += "modules.ActorModule"
play.modules.enabled += "modules.TokenRefreshModule"

# JWT Configuration
jwt {
    secret = "your-super-secret-key-change-this-in-production-min-32-chars"
    expiry-minutes = 60
}

# put secrets before running the app

# Google OAuth Configuration
google.oauth {
  client-id = ${?GOOGLE_CLIENT_ID}
  client-secret = ${?GOOGLE_CLIENT_SECRET}
  redirect-uri = ${?GOOGLE_REDIRECT_URI}
  authorization-uri = "https://accounts.google.com/o/oauth2/v2/auth"
  token-uri = "https://oauth2.googleapis.com/token"
  userinfo-uri = "https://openidconnect.googleapis.com/v1/userinfo"
  scopes = "openid email profile"
}

# State/Nonce Store (Redis or in-memory, TTL 5 minutes)
oauth.state-nonce-ttl-seconds = 300
# OAuth token refresh (seconds)
oauth.refresh-interval-seconds = 300
oauth.refresh-leeway-seconds   = 300